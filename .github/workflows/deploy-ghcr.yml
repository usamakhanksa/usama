name: Deploy Containers to GHCR

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/API/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/saas-hrm-api:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/saas-hrm-api:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/saas-hrm-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/saas-hrm-frontend:${{ github.sha }}
